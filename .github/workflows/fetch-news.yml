name: Daily Content Generate

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼도 유지

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate content (요일제 교과/뉴스) → news.json
        # ANTHROPIC_API_KEY 시크릿이 있으면 교과 생성, 없으면 뉴스로 폴백
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-content.js

      - name: Commit news.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          git diff --cached --quiet || git commit -m "chore: 콘텐츠 자동 생성 $(date +'%Y-%m-%d')"
          git push
